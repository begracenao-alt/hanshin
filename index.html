<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>運行日報</title>
<meta name="theme-color" content="#6b8f7a">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="運行日報">
<style>
  :root{
    --main:#6b8f7a;      /* やさしい緑 */
    --main-d:#557462;
    --bg:#f4f1ea;         /* あたたかい生成り */
    --card:#ffffff;
    --line:#e3ddcf;
    --text:#3a3a34;
    --sub:#8a8578;
    --accent:#c98a5e;     /* やさしい橙 */
  }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body{
    margin:0; font-family:-apple-system,"Hiragino Kaku Gothic ProN","メイリオ",sans-serif;
    background:var(--bg); color:var(--text); line-height:1.7;
    padding-bottom:120px;
  }
  header{
    background:var(--main); color:#fff; padding:16px 18px 14px;
    position:sticky; top:0; z-index:10;
    box-shadow:0 2px 8px rgba(0,0,0,.08);
  }
  header .company{ font-size:12px; opacity:.9; letter-spacing:.08em; margin-bottom:1px; }
  header h1{ margin:0; font-size:19px; letter-spacing:.05em; }
  header .date{ font-size:13px; opacity:.9; margin-top:2px; }
  .wrap{ padding:16px 14px; max-width:560px; margin:0 auto; }

  .name-row{
    background:var(--card); border:1px solid var(--line); border-radius:14px;
    padding:12px 14px; margin-bottom:14px; display:flex; align-items:center; gap:10px;
  }
  .name-row label{ font-size:14px; color:var(--sub); white-space:nowrap; }
  .name-row input{
    flex:1; border:none; border-bottom:2px solid var(--line); font-size:17px;
    padding:6px 2px; background:transparent; color:var(--text);
  }
  .name-row input:focus{ outline:none; border-bottom-color:var(--main); }
  .name-row select{ flex:1; border:none; border-bottom:2px solid var(--line); font-size:17px;
    padding:6px 2px; background:transparent; color:var(--text); }
  .name-row select:focus{ outline:none; border-bottom-color:var(--main); }
  .name-manual{ width:100%; border:1px solid var(--line); border-radius:12px; font-size:16px;
    padding:10px 12px; margin:-6px 0 12px; background:#fcfbf7; color:var(--text); }
  .name-manual:focus{ outline:none; border-color:var(--main); }
  .name-tools{ margin:-4px 4px 16px; text-align:right; }
  .link-btn{ background:none; border:none; color:var(--main-d); font-size:13px; cursor:pointer; text-decoration:underline; }
  .names-editor{ position:fixed; inset:0; background:rgba(0,0,0,.35); display:flex;
    align-items:center; justify-content:center; z-index:100; padding:20px; }
  .ne-card{ background:#fff; border-radius:18px; padding:20px; width:100%; max-width:420px; }
  .ne-title{ font-size:17px; font-weight:bold; color:var(--main-d); margin-bottom:8px; }
  .ne-hint{ font-size:13px; color:var(--sub); margin:0 0 10px; line-height:1.6; }
  .ne-card textarea{ width:100%; min-height:160px; border:1px solid var(--line); border-radius:12px;
    padding:10px 12px; font-size:15px; font-family:inherit; line-height:1.9; background:#fcfbf7; color:var(--text); }
  .ne-card textarea:focus{ outline:none; border-color:var(--main); }
  .ne-actions{ display:flex; gap:10px; margin-top:12px; }
  .ne-btn{ flex:1; border:1px solid var(--line); background:#fff; color:var(--sub);
    border-radius:12px; padding:12px; font-size:15px; font-weight:bold; cursor:pointer; }
  .ne-btn.primary{ background:var(--main); color:#fff; border-color:var(--main); }

  .big-btn{
    width:100%; background:var(--main); color:#fff; border:none; border-radius:18px;
    font-size:20px; font-weight:bold; padding:22px; margin-bottom:8px;
    box-shadow:0 4px 0 var(--main-d); cursor:pointer; letter-spacing:.05em;
  }
  .big-btn:active{ transform:translateY(3px); box-shadow:0 1px 0 var(--main-d); }
  .hint{ text-align:center; color:var(--sub); font-size:13px; margin:2px 0 18px; }

  .section-title{ font-size:15px; color:var(--sub); margin:22px 4px 10px; font-weight:bold; }
  .count{ color:var(--main-d); }

  .card{
    background:var(--card); border:1px solid var(--line); border-radius:16px;
    padding:14px; margin-bottom:12px; box-shadow:0 1px 4px rgba(0,0,0,.04);
  }
  .card .top{ display:flex; align-items:center; justify-content:space-between; margin-bottom:8px; }
  .card .time{ font-size:22px; font-weight:bold; color:var(--main-d); }
  .card .geo{ font-size:12px; }
  .card .geo a{ color:var(--accent); text-decoration:none; border-bottom:1px dotted var(--accent); }
  .card .geo .none{ color:var(--sub); }
  .card .geo .geo-retry{
    background:#fbeee6; color:var(--accent); border:1px solid #eeced9;
    border-radius:20px; font-size:12px; padding:5px 12px; cursor:pointer;
  }
  .card .geo .geo-retry:active{ background:#f5ddd0; }
  .card input.place{
    width:100%; border:none; border-bottom:1.5px solid var(--line);
    font-size:16px; padding:6px 2px; margin-bottom:8px; background:transparent; color:var(--text);
  }
  .card input.place:focus{ outline:none; border-bottom-color:var(--main); }
  .card textarea.memo{
    width:100%; border:1px solid var(--line); border-radius:10px;
    font-size:15px; padding:8px 10px; min-height:56px; resize:vertical;
    background:#fcfbf7; color:var(--text); font-family:inherit; line-height:1.6;
  }
  .card textarea.memo:focus{ outline:none; border-color:var(--main); }
  .tags{ margin:8px 0 2px; display:flex; flex-wrap:wrap; gap:6px; }
  .tag{
    font-size:13px; background:#eef3ef; color:var(--main-d); border:1px solid #dfe8e1;
    border-radius:20px; padding:4px 12px; cursor:pointer;
  }
  .tag:active{ background:#dfe8e1; }
  .del{
    background:none; border:none; color:#c78; font-size:13px; cursor:pointer; padding:4px 2px;
  }

  .empty{ text-align:center; color:var(--sub); padding:30px 10px; font-size:14px; }

  .footer-actions{
    position:fixed; left:0; right:0; bottom:0; background:rgba(244,241,234,.96);
    border-top:1px solid var(--line); padding:10px 14px; display:flex; gap:10px;
    max-width:560px; margin:0 auto;
  }
  .foot-btn{
    flex:1; border:1px solid var(--main); background:#fff; color:var(--main-d);
    border-radius:12px; font-size:15px; font-weight:bold; padding:14px 8px; cursor:pointer;
  }
  .foot-btn:active{ background:#eef3ef; }

  .day-pick{ margin:0 4px 4px; }
  .day-pick select{
    font-size:14px; padding:6px 8px; border-radius:10px; border:1px solid var(--line);
    background:#fff; color:var(--text);
  }

  /* 売上・粗利 */
  .money{
    background:var(--card); border:1px solid var(--line); border-radius:16px;
    padding:14px; margin:0 4px 16px; box-shadow:0 1px 4px rgba(0,0,0,.04);
  }
  .money h2{ font-size:15px; margin:0 0 4px; color:var(--main-d); }
  .money .worked-info{ font-size:12px; color:var(--sub); margin:0 0 10px; }
  .money .goal-note{ font-size:11.5px; color:var(--sub); margin-top:8px; line-height:1.5; }
  .money .in-row{ display:flex; gap:10px; margin-bottom:12px; }
  .money .fld{ flex:1; }
  .money label{ font-size:12px; color:var(--sub); display:block; margin-bottom:3px; }
  .money .money-input{ display:flex; align-items:center; gap:4px;
     border:1px solid var(--line); border-radius:10px; padding:8px 10px; background:#fcfbf7; }
  .money .money-input input{ width:100%; border:none; background:transparent; font-size:17px; text-align:right; color:var(--text); }
  .money .money-input input:focus{ outline:none; }
  .money .yen{ font-size:13px; color:var(--sub); }
  .money .panel{ display:flex; gap:10px; }
  .money .pbox{ flex:1; border-radius:12px; padding:10px 12px; background:#f2f6f2; }
  .money .pbox .lbl{ font-size:12px; color:var(--sub); }
  .money .pbox .sum{ font-size:17px; font-weight:bold; color:var(--text); margin:2px 0; }
  .money .pbox .diff{ font-size:12.5px; font-weight:bold; line-height:1.4; }
  .money .pbox .diff.plus{ color:#2e8b57; }
  .money .pbox .diff.minus{ color:#c0603f; }
  .money .pbox .diff.none{ color:var(--sub); font-weight:normal; }
  .money details{ margin-top:12px; }
  .money summary{ font-size:13px; color:var(--main-d); cursor:pointer; }
  .money .goal-row{ display:flex; gap:10px; margin-top:8px; }
  .toast{
    position:fixed; bottom:88px; left:50%; transform:translateX(-50%);
    background:var(--main-d); color:#fff; padding:10px 18px; border-radius:30px;
    font-size:14px; opacity:0; transition:opacity .25s; pointer-events:none; z-index:50;
  }
  .toast.show{ opacity:1; }

  /* 印刷用（A4 1枚に収まるコンパクトな表形式） */
  #printArea{ display:none; }
  @media print{
    @page{ margin: 10mm; }
    header, .name-row, .name-manual, .name-tools, .names-editor, .big-btn, .hint,
    .day-pick, .section-title, #list, .footer-actions, .toast, .money{ display:none !important; }
    body{ background:#fff; padding:0; font-size:11px; }
    #printArea{ display:block !important; padding:0; color:#000; }
    #printArea .p-head{ font-size:15px; font-weight:bold; border-bottom:1.5px solid #000; padding-bottom:5px; margin-bottom:8px; }
    #printArea .p-sub{ font-size:11px; font-weight:normal; }
    #printArea table{ width:100%; border-collapse:collapse; }
    #printArea thead{ display:table-header-group; }
    #printArea th{ font-size:10px; text-align:left; border-bottom:1px solid #000; padding:3px 5px; background:#eee; }
    #printArea td{ font-size:11px; border-bottom:0.5px solid #ccc; padding:3px 5px; vertical-align:top; }
    #printArea td.t{ font-weight:bold; white-space:nowrap; }
    #printArea td.g{ text-align:center; }
    #printArea tr{ page-break-inside:avoid; }
    #printArea .p-empty{ color:#666; padding:10px; }
    #printArea .p-money{ margin-top:10px; padding-top:6px; border-top:1.5px solid #000; font-size:11px; line-height:1.6; }
  }
</style>
</head>
<body>

<header>
  <div class="company">阪神食品株式会社</div>
  <h1>運行日報</h1>
  <div class="date" id="headerDate"></div>
</header>

<div class="wrap">

  <div class="name-row">
    <label>お名前</label>
    <select id="driverSelect"></select>
  </div>
  <input type="text" id="driverManual" class="name-manual" placeholder="お名前を入力（イレギュラーの方）" style="display:none" />
  <div class="name-tools">
    <button id="editNamesBtn" class="link-btn">📋 名簿を編集（エクセルから貼り付け）</button>
  </div>

  <button class="big-btn" id="arriveBtn">＋　配達先に着いた</button>
  <div class="hint">着いたら、このボタンをポンと押してください</div>

  <div class="day-pick">
    <select id="daySelect"></select>
  </div>

  <div class="money">
    <h2>💰 売上・粗利（<span id="moneyMonth"></span>）</h2>
    <div class="worked-info" id="workedInfo"></div>
    <div class="in-row">
      <div class="fld">
        <label>本日の売上</label>
        <div class="money-input"><input id="salesToday" type="text" inputmode="numeric" placeholder="0"><span class="yen">円</span></div>
      </div>
      <div class="fld">
        <label>本日の粗利</label>
        <div class="money-input"><input id="profitToday" type="text" inputmode="numeric" placeholder="0"><span class="yen">円</span></div>
      </div>
    </div>
    <div class="panel">
      <div class="pbox">
        <div class="lbl">今月の売上（累計）</div>
        <div class="sum" id="salesSum">0円</div>
        <div class="diff none" id="salesDiff">目標を入れると差が出ます</div>
      </div>
      <div class="pbox">
        <div class="lbl">今月の粗利（累計）</div>
        <div class="sum" id="profitSum">0円</div>
        <div class="diff none" id="profitDiff">目標を入れると差が出ます</div>
      </div>
    </div>
    <details>
      <summary>今月の目標・実働日数を入れる ▾</summary>
      <div class="goal-row">
        <div class="fld">
          <label>売上目標（今月）</label>
          <div class="money-input"><input id="salesGoal" type="text" inputmode="numeric" placeholder="0"><span class="yen">円</span></div>
        </div>
        <div class="fld">
          <label>粗利目標（今月）</label>
          <div class="money-input"><input id="profitGoal" type="text" inputmode="numeric" placeholder="0"><span class="yen">円</span></div>
        </div>
      </div>
      <div class="goal-row" style="margin-top:8px">
        <div class="fld">
          <label>今月の実働日数（何日はたらく月？）</label>
          <div class="money-input"><input id="workdaysGoal" type="text" inputmode="numeric" placeholder="例：22"><span class="yen">日</span></div>
        </div>
      </div>
      <div class="goal-note">※「実働日数」を入れると、今の“ペース”で目標より上か下かが出ます😊</div>
    </details>
  </div>

  <div class="section-title">この日の記録　<span class="count" id="count"></span></div>
  <div id="list"></div>

</div>

<div class="footer-actions">
  <button class="foot-btn" id="copyBtn">コピー</button>
  <button class="foot-btn" id="csvBtn">表で保存</button>
  <button class="foot-btn" id="printBtn">印刷</button>
</div>

<div id="namesEditor" class="names-editor" style="display:none">
  <div class="ne-card">
    <div class="ne-title">名簿の編集</div>
    <p class="ne-hint">エクセルの名前をコピーして、下に貼り付けてください。<br>（1行に1人ずつ。たくさん貼ってもOKです）</p>
    <textarea id="namesText" placeholder="山田太郎&#10;鈴木花子&#10;佐藤次郎"></textarea>
    <div class="ne-actions">
      <button id="namesCancel" class="ne-btn">やめる</button>
      <button id="namesSave" class="ne-btn primary">保存</button>
    </div>
  </div>
</div>

<div id="printArea"></div>

<div class="toast" id="toast"></div>

<script>
const KEY = "unkou-nippou-v1";
const NAMEKEY = "unkou-nippou-name";

function loadAll(){
  try { return JSON.parse(localStorage.getItem(KEY)) || []; }
  catch(e){ return []; }
}
function saveAll(list){ localStorage.setItem(KEY, JSON.stringify(list)); }

let records = loadAll();

// ---- お名前（名簿から選ぶ／イレギュラーは手入力／名簿はエクセルから貼り付け）----
const NAMESKEY = "unkou-nippou-names";
function loadNames(){ try{ return JSON.parse(localStorage.getItem(NAMESKEY))||[]; }catch(e){ return []; } }
function saveNames(){ localStorage.setItem(NAMESKEY, JSON.stringify(nameList)); }
let nameList = loadNames();

const driverSelect = document.getElementById("driverSelect");
const driverManual = document.getElementById("driverManual");

function currentName(){
  if(driverSelect.value==="__manual__") return driverManual.value.trim();
  return driverSelect.value.trim();
}
function setStoredName(n){ localStorage.setItem(NAMEKEY, n||""); }

function renderNameSelect(){
  const stored = localStorage.getItem(NAMEKEY) || "";
  driverSelect.innerHTML="";
  const o0=document.createElement("option"); o0.value=""; o0.textContent="― 選んでください ―"; driverSelect.appendChild(o0);
  nameList.forEach(nm=>{ const o=document.createElement("option"); o.value=nm; o.textContent=nm; driverSelect.appendChild(o); });
  const om=document.createElement("option"); om.value="__manual__"; om.textContent="✏️ その他（手入力）"; driverSelect.appendChild(om);
  if(stored && nameList.includes(stored)){
    driverSelect.value=stored; driverManual.style.display="none";
  } else if(stored){
    driverSelect.value="__manual__"; driverManual.style.display="block"; driverManual.value=stored;
  } else {
    driverSelect.value=""; driverManual.style.display="none";
  }
}
driverSelect.addEventListener("change",()=>{
  if(driverSelect.value==="__manual__"){
    driverManual.style.display="block"; driverManual.focus(); setStoredName(driverManual.value.trim());
  } else {
    driverManual.style.display="none"; setStoredName(driverSelect.value.trim());
  }
});
driverManual.addEventListener("input",()=> setStoredName(driverManual.value.trim()));

// 名簿の編集
const namesEditor=document.getElementById("namesEditor");
const namesText=document.getElementById("namesText");
document.getElementById("editNamesBtn").addEventListener("click",()=>{
  namesText.value=nameList.join("\n"); namesEditor.style.display="flex";
});
document.getElementById("namesCancel").addEventListener("click",()=>{ namesEditor.style.display="none"; });
document.getElementById("namesSave").addEventListener("click",()=>{
  const list=namesText.value.split(/[\n,、\t]+/).map(s=>s.trim()).filter(Boolean);
  const seen=new Set(); nameList=list.filter(n=>{ if(seen.has(n))return false; seen.add(n); return true; });
  saveNames(); renderNameSelect(); namesEditor.style.display="none";
  toast("名簿を保存しました");
});
renderNameSelect();

// ---- 売上・粗利 ----
const MONEYKEY = "unkou-nippou-money";
function loadMoney(){ try{ return JSON.parse(localStorage.getItem(MONEYKEY)) || {daily:{},goals:{}}; }catch(e){ return {daily:{},goals:{}}; } }
function saveMoney(){ localStorage.setItem(MONEYKEY, JSON.stringify(money)); }
let money = loadMoney();
if(!money.daily) money.daily={};
if(!money.goals) money.goals={};

function monthOf(d){ return d.slice(0,7); }
function numFmt(n){ return (n||0).toLocaleString("ja-JP"); }
function parseNum(v){ const n=parseInt(String(v).replace(/[^\d-]/g,""),10); return isNaN(n)?0:n; }

const salesToday=document.getElementById("salesToday");
const profitToday=document.getElementById("profitToday");
const salesGoal=document.getElementById("salesGoal");
const profitGoal=document.getElementById("profitGoal");
const workdaysGoal=document.getElementById("workdaysGoal");

function monthSum(mo){
  let s=0,p=0;
  Object.keys(money.daily).forEach(dt=>{
    if(dt.slice(0,7)===mo){ s+=(money.daily[dt].sales||0); p+=(money.daily[dt].profit||0); }
  });
  return {s,p};
}
// この月に、売上か粗利を入れた日数（＝働いた日数のめやす）
function countWorkedDays(mo){
  let n=0;
  Object.keys(money.daily).forEach(dt=>{
    if(dt.slice(0,7)===mo){ const d=money.daily[dt]; if((d.sales||0)>0 || (d.profit||0)>0) n++; }
  });
  return n;
}
function renderMoneyInputs(){
  document.getElementById("moneyMonth").textContent = (+monthOf(selectedDay).slice(5)) + "月";
  const d = money.daily[selectedDay] || {};
  salesToday.value  = d.sales!=null  ? numFmt(d.sales)  : "";
  profitToday.value = d.profit!=null ? numFmt(d.profit) : "";
  const g = money.goals[monthOf(selectedDay)] || {};
  salesGoal.value    = g.sales!=null    ? numFmt(g.sales)    : "";
  profitGoal.value   = g.profit!=null   ? numFmt(g.profit)   : "";
  workdaysGoal.value = g.workdays!=null  ? g.workdays : "";
}
function renderMoneyPanel(){
  const mo=monthOf(selectedDay);
  const {s,p}=monthSum(mo);
  document.getElementById("salesSum").textContent  = numFmt(s)+"円";
  document.getElementById("profitSum").textContent = numFmt(p)+"円";
  const g=money.goals[mo]||{};
  const worked=countWorkedDays(mo);
  const total=g.workdays||0;
  const wi=document.getElementById("workedInfo");
  if(total)      wi.textContent=`働いた日数：${worked}日 ／ 今月の実働 ${total}日`;
  else if(worked)wi.textContent=`働いた日数：${worked}日（実働日数を入れると「今のペース」が出ます）`;
  else           wi.textContent="";
  setDiff("salesDiff",  s, g.sales,  total, worked);
  setDiff("profitDiff", p, g.profit, total, worked);
}
function setDiff(id,sum,goal,totalDays,workedDays){
  const el=document.getElementById(id);
  if(!goal){ el.className="diff none"; el.textContent="目標を入れると差が出ます"; return; }
  if(totalDays && workedDays){
    // 今の“ペース”で、あるべき所（＝1日あたり目標×働いた日数）と比べる
    const target=Math.round(goal/totalDays*workedDays);
    const d=sum-target;
    if(d>=0){ el.className="diff plus";  el.textContent="今のペース：目標より ＋"+numFmt(d)+"円 ✨"; }
    else    { el.className="diff minus"; el.textContent="今のペース：目標より −"+numFmt(-d)+"円"; }
  } else {
    const d=sum-goal;
    if(d>=0){ el.className="diff plus";  el.textContent="今月の目標を ＋"+numFmt(d)+"円 達成✨"; }
    else    { el.className="diff minus"; el.textContent="今月の目標まで あと "+numFmt(-d)+"円"; }
  }
}
function renderMoney(){ renderMoneyInputs(); renderMoneyPanel(); }

// 入力しながら 1,000 のようにコンマを入れる
function commafy(el){
  const digits=el.value.replace(/[^\d]/g,"");
  el.value = digits ? (+digits).toLocaleString("ja-JP") : "";
}
salesToday.addEventListener("input",()=>setDailyNum("sales",salesToday.value));
salesToday.addEventListener("blur",()=>commafy(salesToday));
profitToday.addEventListener("input",()=>setDailyNum("profit",profitToday.value));
profitToday.addEventListener("blur",()=>commafy(profitToday));
function setDailyNum(key,val){
  if(!money.daily[selectedDay]) money.daily[selectedDay]={};
  money.daily[selectedDay][key]=parseNum(val);
  saveMoney(); renderMoneyPanel();
}
salesGoal.addEventListener("input",()=>setGoal("sales",salesGoal.value));
salesGoal.addEventListener("blur",()=>commafy(salesGoal));
profitGoal.addEventListener("input",()=>setGoal("profit",profitGoal.value));
profitGoal.addEventListener("blur",()=>commafy(profitGoal));
workdaysGoal.addEventListener("input",()=>setGoal("workdays",workdaysGoal.value));
function setGoal(key,val){
  const mo=monthOf(selectedDay);
  if(!money.goals[mo]) money.goals[mo]={};
  money.goals[mo][key]=parseNum(val);
  saveMoney(); renderMoneyPanel();
}
function paceLine(label,sum,goal,totalDays,workedDays){
  if(!goal) return `${label}：目標 未設定`;
  if(totalDays && workedDays){
    const target=Math.round(goal/totalDays*workedDays); const d=sum-target;
    return d>=0?`${label}：今のペース 目標＋${numFmt(d)}円`:`${label}：今のペース 目標−${numFmt(-d)}円`;
  }
  const d=sum-goal;
  return d>=0?`${label}：目標＋${numFmt(d)}円`:`${label}：目標まであと${numFmt(-d)}円`;
}
function moneySummaryText(){
  const mo=monthOf(selectedDay);
  const d=money.daily[selectedDay]||{};
  const {s,p}=monthSum(mo);
  const g=money.goals[mo]||{};
  const worked=countWorkedDays(mo), total=g.workdays||0;
  if(!(d.sales||d.profit||s||p||g.sales||g.profit)) return "";
  let t="【売上・粗利】";
  t+=`\n本日 売上 ${numFmt(d.sales||0)}円 ／ 粗利 ${numFmt(d.profit||0)}円`;
  t+=`\n今月累計 売上 ${numFmt(s)}円 ／ 粗利 ${numFmt(p)}円`;
  if(total) t+=`\n実働 ${worked}／${total}日`;
  t+=`\n${paceLine("売上",s,g.sales,total,worked)}`;
  t+=`\n${paceLine("粗利",p,g.profit,total,worked)}`;
  return t;
}

// 日付まわり
function todayStr(d){
  d = d || new Date();
  const y=d.getFullYear(), m=String(d.getMonth()+1).padStart(2,"0"), da=String(d.getDate()).padStart(2,"0");
  return `${y}-${m}-${da}`;
}
function jpDate(str){
  const [y,m,d]=str.split("-");
  const week=["日","月","火","水","木","金","土"];
  const dt=new Date(+y,+m-1,+d);
  return `${+m}月${+d}日（${week[dt.getDay()]}）`;
}
let selectedDay = todayStr();
document.getElementById("headerDate").textContent = jpDate(selectedDay) + " の記録";

// 時刻表示
function hhmm(iso){
  const d=new Date(iso);
  return String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0");
}

function newId(){ return "r"+Math.floor(performance.now()*1000)+"-"+records.length; }

// ---- 描画 ----
function render(){
  // 日付リスト
  const days=[...new Set(records.map(r=>r.day))];
  if(!days.includes(todayStr())) days.unshift(todayStr());
  days.sort().reverse();
  if(!days.includes(selectedDay)) selectedDay=days[0];
  const sel=document.getElementById("daySelect");
  sel.innerHTML="";
  days.forEach(dy=>{
    const o=document.createElement("option");
    o.value=dy; o.textContent=jpDate(dy)+(dy===todayStr()?"（きょう）":"");
    if(dy===selectedDay) o.selected=true;
    sel.appendChild(o);
  });
  document.getElementById("headerDate").textContent = jpDate(selectedDay) + " の記録";

  const dayRecs = records.filter(r=>r.day===selectedDay);
  document.getElementById("count").textContent = dayRecs.length ? `（${dayRecs.length}件）` : "";

  renderMoney();

  const list=document.getElementById("list");
  list.innerHTML="";
  if(dayRecs.length===0){
    list.innerHTML=`<div class="empty">まだ記録はありません。<br>着いたら上のボタンを押してくださいね。</div>`;
    return;
  }
  // 新しい順
  dayRecs.slice().reverse().forEach(r=>{
    const card=document.createElement("div");
    card.className="card";
    let geoHtml;
    if(r.lat!=null){
      geoHtml=`<a href="https://www.google.com/maps?q=${r.lat},${r.lng}" target="_blank">📍 地図で見る</a>`;
    } else if(r.geoPending){
      geoHtml=`<span class="none">📍 現在地をさがしています…</span>`;
    } else {
      geoHtml=`<button class="geo-retry" data-id="${r.id}">📍 ${escHtml(r.geoErr||"場所が取れませんでした")}｜もう一度さがす</button>`;
    }
    card.innerHTML=`
      <div class="top">
        <div class="time">${hhmm(r.time)}</div>
        <div class="geo">${geoHtml}</div>
      </div>
      <input class="place" placeholder="行き先の名前（例：〇〇様、△△商店）" value="${escAttr(r.place||"")}">
      <textarea class="memo" placeholder="やり取りのメモ（例：お渡し済み・不在で再配達など）">${escHtml(r.memo||"")}</textarea>
      <div class="tags">
        <span class="tag">お渡し済み</span>
        <span class="tag">不在</span>
        <span class="tag">再配達</span>
        <span class="tag">受け取りサインあり</span>
      </div>
      <div style="text-align:right"><button class="del">この記録を消す</button></div>
    `;
    const placeEl=card.querySelector(".place");
    const memoEl=card.querySelector(".memo");
    placeEl.addEventListener("input",()=>{ r.place=placeEl.value; saveAll(records); });
    memoEl.addEventListener("input",()=>{ r.memo=memoEl.value; saveAll(records); });
    card.querySelectorAll(".tag").forEach(t=>{
      t.addEventListener("click",()=>{
        memoEl.value = memoEl.value ? memoEl.value.replace(/\s*$/,"") + "／" + t.textContent : t.textContent;
        r.memo=memoEl.value; saveAll(records);
      });
    });
    card.querySelector(".del").addEventListener("click",()=>{
      if(confirm("この記録を消してもいいですか？")){
        records=records.filter(x=>x.id!==r.id); saveAll(records); render();
      }
    });
    const retry=card.querySelector(".geo-retry");
    if(retry) retry.addEventListener("click",()=>{
      const rr=records.find(x=>x.id===retry.dataset.id); if(rr) captureGeo(rr);
    });
    list.appendChild(card);
  });
}

function escHtml(s){ return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function escAttr(s){ return escHtml(s).replace(/"/g,"&quot;"); }

// ---- 現在地の取得（着いたボタン・もう一度さがす、両方でつかう）----
function captureGeo(rec){
  rec.geoPending=true; rec.geoErr=null; saveAll(records); render();
  if(!navigator.geolocation){
    rec.geoPending=false; rec.geoErr="このスマホでは場所が使えません"; saveAll(records); render(); return;
  }
  navigator.geolocation.getCurrentPosition(
    pos=>{ rec.lat=+pos.coords.latitude.toFixed(6); rec.lng=+pos.coords.longitude.toFixed(6);
           rec.geoPending=false; rec.geoErr=null; saveAll(records); render(); },
    err=>{ rec.geoPending=false;
           if(err.code===1) rec.geoErr="居場所の許可がオフです";
           else if(err.code===3) rec.geoErr="時間がかかりました";
           else rec.geoErr="いま場所が取れませんでした";
           saveAll(records); render(); },
    { enableHighAccuracy:true, timeout:15000, maximumAge:30000 }
  );
}

// ---- 着いたボタン ----
document.getElementById("arriveBtn").addEventListener("click",()=>{
  const now=new Date();
  const rec={ id:newId(), day:todayStr(now), time:now.toISOString(),
              place:"", memo:"", lat:null, lng:null, geoPending:true, geoErr:null };
  records.push(rec);
  selectedDay=todayStr(now);
  saveAll(records); render();
  toast("記録しました");
  captureGeo(rec);
});

document.getElementById("daySelect").addEventListener("change",e=>{ selectedDay=e.target.value; render(); });

// ---- 日報コピー ----
function buildText(){
  const name=currentName()||"（お名前未記入）";
  const recs=records.filter(r=>r.day===selectedDay);
  let t=`【運行日報】${jpDate(selectedDay)}　${name}\n`;
  if(recs.length===0){ t+="（記録なし）"; }
  else recs.forEach(r=>{
    t+=`\n${hhmm(r.time)}　${r.place||"（行き先未記入）"}`;
    if(r.memo) t+=`\n　└ ${r.memo}`;
    if(r.lat!=null) t+=`\n　└ 地図 https://www.google.com/maps?q=${r.lat},${r.lng}`;
  });
  const mtxt=moneySummaryText();
  if(mtxt) t+="\n\n"+mtxt;
  return t;
}
document.getElementById("copyBtn").addEventListener("click",async()=>{
  const t=buildText();
  try{ await navigator.clipboard.writeText(t); toast("日報をコピーしました"); }
  catch(e){ prompt("下をコピーしてください（長押し→コピー）", t); }
});

// ---- CSV保存 ----
document.getElementById("csvBtn").addEventListener("click",()=>{
  const name=currentName()||"";
  const recs=records.filter(r=>r.day===selectedDay);
  let rows=[["日付","時刻","運転手","行き先","メモ","緯度","経度","地図リンク"]];
  recs.forEach(r=>{
    rows.push([selectedDay, hhmm(r.time), name, r.place||"", r.memo||"",
      r.lat??"", r.lng??"", r.lat!=null?`https://www.google.com/maps?q=${r.lat},${r.lng}`:""]);
  });
  const csv="﻿"+rows.map(row=>row.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(",")).join("\r\n");
  const blob=new Blob([csv],{type:"text/csv"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download=`運行日報_${selectedDay}.csv`;
  a.click();
  toast("表を保存しました");
});

// ---- 印刷 ----
document.getElementById("printBtn").addEventListener("click",()=>{
  const name=currentName()||"（お名前未記入）";
  const recs=records.filter(r=>r.day===selectedDay);
  const rows = recs.length===0 ? `<tr><td colspan="4" class="p-empty">この日の記録はありません。</td></tr>` :
    recs.map(r=>`<tr>`
      +`<td class="t">${hhmm(r.time)}</td>`
      +`<td>${escHtml(r.place||"（未記入）")}</td>`
      +`<td>${escHtml(r.memo||"")}</td>`
      +`<td class="g">${r.lat!=null?"📍":""}</td>`
      +`</tr>`).join("");
  const table = `<table><thead><tr>`
    +`<th style="width:44px">時刻</th><th>行き先</th><th>メモ</th><th style="width:28px">地図</th>`
    +`</tr></thead><tbody>${rows}</tbody></table>`;
  const mtxt=moneySummaryText();
  const moneyBlock = mtxt ? `<div class="p-money">${escHtml(mtxt).replace(/\n/g,"<br>")}</div>` : "";
  document.getElementById("printArea").innerHTML =
    `<div class="p-head">運行日報　<span class="p-sub">阪神食品株式会社</span><br>
       <span class="p-sub">${jpDate(selectedDay)}　お名前：${escHtml(name)}　（${recs.length}件）</span></div>${table}${moneyBlock}`;
  window.print();
});

// ---- トースト ----
let toastTimer;
function toast(msg){
  const el=document.getElementById("toast");
  el.textContent=msg; el.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>el.classList.remove("show"),1600);
}

// ---- アプリ化（ホーム画面・圏外OK）----
if("serviceWorker" in navigator){
  window.addEventListener("load",()=>{ navigator.serviceWorker.register("sw.js").catch(()=>{}); });
}

render();
</script>
